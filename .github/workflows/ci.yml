name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest --cov=pymixef --cov-fail-under=70
      - run: python -m ruff check src tests benchmarks examples scripts
      - run: python -m ruff format --check src tests benchmarks examples scripts
      - run: python -m mypy
      - run: python benchmarks/run.py --output benchmark-results.json
      - run: python -m build

  notebooks:
    name: Tutorial notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[notebooks]"
      - run: python scripts/validate_notebooks.py

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[docs]"
      - run: python scripts/extract_notebook_figures.py --check
      - run: python -m sphinx -W --keep-going -b dirhtml docs docs/_build/dirhtml
      - run: python scripts/audit_documentation.py
