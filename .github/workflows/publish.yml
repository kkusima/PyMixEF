name: Publish to PyPI

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python scripts/check_release_tag.py "$RELEASE_TAG"
      - name: Install release tooling
        run: python -m pip install --upgrade build twine
      - name: Install package and notebook runtime
        run: python -m pip install -e ".[notebooks]"
      - name: Validate and execute tutorial notebooks
        run: python scripts/validate_notebooks.py
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate package metadata and long description
        run: python -m twine check --strict dist/*
      - name: Store verified distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pymixef
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
