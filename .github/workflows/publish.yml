name: Publish to PyPI

on:
  workflow_dispatch:

concurrency:
  group: pymixef-publish
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release_identity.outputs.tag }}
      release_version: ${{ steps.release_identity.outputs.version }}
      release_commit: ${{ steps.release_identity.outputs.commit }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Derive and verify release identity
        id: release_identity
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Publishing must be dispatched from the main branch."
            exit 1
          fi
          release_tag="$(python scripts/check_release_tag.py --print-tag)"
          python scripts/check_release_tag.py "$release_tag"
          {
            echo "tag=$release_tag"
            echo "version=${release_tag#v}"
            echo "commit=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"
      - name: Refuse an already-published version
        env:
          RELEASE_VERSION: ${{ steps.release_identity.outputs.version }}
        shell: bash
        run: |
          status="$(
            curl \
              --retry 3 \
              --retry-all-errors \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              "https://pypi.org/pypi/pymixef/${RELEASE_VERSION}/json"
          )"
          if [[ "$status" == "200" ]]; then
            echo "::error::PyMixEF ${RELEASE_VERSION} is already published on PyPI."
            exit 1
          fi
          if [[ "$status" != "404" ]]; then
            echo "::error::PyPI returned unexpected HTTP status ${status}."
            exit 1
          fi
      - name: Install release tooling
        run: python -m pip install --upgrade build twine
      - name: Install package and notebook runtime
        run: python -m pip install -e ".[notebooks]"
      - name: Validate and execute tutorial notebooks
        run: python scripts/validate_notebooks.py
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate package metadata and long description
        run: python -m twine check --strict dist/*
      - name: Store verified distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  release:
    name: Create verified GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Create or verify the matching release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build.outputs.release_commit }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        shell: bash
        run: |
          if existing_commit="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
              --jq ".sha" 2>/dev/null
          )"; then
            :
          else
            existing_commit=""
          fi
          if [[ -n "$existing_commit" && "$existing_commit" != "$RELEASE_COMMIT" ]]; then
            echo "::error::${RELEASE_TAG} already points to ${existing_commit}, not ${RELEASE_COMMIT}."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload \
              "$RELEASE_TAG" \
              dist/* \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create \
              "$RELEASE_TAG" \
              dist/* \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_COMMIT" \
              --title "PyMixEF ${RELEASE_VERSION}"
          fi

  publish:
    name: Publish verified distributions
    needs: [build, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pymixef/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
