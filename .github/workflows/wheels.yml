name: Release distributions

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import pymixef; assert pymixef.__version__"
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  test-native-abi:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S native -B build/native -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build/native --config Release
      - run: ctest --test-dir build/native --build-config Release --output-on-failure
