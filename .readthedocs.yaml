# Read the Docs configuration for PyMixEF.
# Reference: https://docs.readthedocs.com/platform/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/conf.py
  builder: dirhtml
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

search:
  ranking:
    getting-started/*: 6
    user-guide/*: 5
    tutorials/*: 5
    pharmacometrics/*: 4
    api/*: 3
    development/*: -2
  ignore:
    - 404.html
    - 404/index.html
